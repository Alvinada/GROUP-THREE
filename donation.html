<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate | SHRO</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
   <header>
        <nav class="navbar">
            <div class="logo">SHRO</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="programs.html">Our Programs</a></li>
                <li><a href="donations.html" class="btn-donate">Donate Now</a></li>
            </ul>
        </nav>
    </header>
<section class="container" style="margin-top: 100px;">
        <div class="donation-box">
            <h1>Support Our Cause</h1>
            <p>Your donation goes directly toward healthcare access, counseling, and rights education for young parents facing financial hardship.</p>
            
            <div class="donation-options">
                <button class="amt-btn">$25</button>
                <button class="amt-btn">$50</button>
                <button class="amt-btn">$100</button>
                <button class="amt-btn">$500</button>
            </div>
            
            <div style="margin-top: 20px; text-align: left;">
                <label>Custom Amount ($)</label>
                <input type="number" placeholder="Enter amount" style="width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>

            <button class="btn-primary large">Complete Donation</button>
            <p style="font-size: 0.8rem; margin-top: 15px; color: #666;">All donations are secure and tax-deductible.</p>
        </div>
    </section>
</body>
